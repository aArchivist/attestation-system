spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/attestation_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 1
      minimum-idle: 0
      idle-timeout: 10000
      max-lifetime: 30000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: false
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:your_generated_jwt_secret}
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${PORT:8080}
